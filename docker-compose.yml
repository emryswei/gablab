services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    ports:
      - "9529:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: worddb
    volumes:
      - mysql-data:/var/lib/mysql
      - ./public/words/words.sql:/docker-entrypoint-initdb.d/words.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
